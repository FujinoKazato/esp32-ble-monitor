<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ESP32 BLE Monitor</title>
  <style>
    body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; padding: 15px; background-color: #f4f6f9; color: #333; }
    .container { max-width: 960px; margin: 0 auto; background: #fff; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
    h2 { border-bottom: 2px solid #007BFF; padding-bottom: 8px; margin-top: 0; color: #2c3e50; font-size: 1.4rem; }
    h3 { font-size: 1.05rem; color: #495057; margin-top: 0; margin-bottom: 12px; border-left: 4px solid #007BFF; padding-left: 8px; }
    table { width: 100%; border-collapse: collapse; margin-bottom: 0; background: #fff; border-radius: 6px; overflow: hidden; border: 1px solid #e0e0e0; }
    th, td { border: 1px solid #e0e0e0; padding: 10px 12px; text-align: left; font-size: 14px; }
    th { background-color: #f1f3f5; font-weight: 600; }
    tr:nth-child(even) td { background-color: #f8f9fa; }
    .hidden { display: none !important; }
    button { padding: 10px 20px; font-size: 15px; font-weight: 500; cursor: pointer; background-color: #007BFF; color: white; border: none; border-radius: 6px; margin-bottom: 0; transition: background-color 0.2s; }
    button:hover { background-color: #0056b3; }
    button:disabled { background-color: #ccc !important; cursor: not-allowed; }
    input[type="number"] { padding: 8px 12px; font-size: 15px; border: 1px solid #ced4da; border-radius: 4px; width: 120px; box-sizing: border-box; }
    .form-group { margin-bottom: 15px; }
    .form-group label { font-weight: 600; font-size: 14px; color: #495057; }
    .lamp { display: inline-block; width: 12px; height: 12px; border-radius: 50%; margin-right: 8px; vertical-align: middle; }
    .lamp-green { background-color: #28a745; box-shadow: 0 0 6px #28a745; }
    .lamp-red { background-color: #dc3545; box-shadow: 0 0 6px #dc3545; }
    #connectionStatus { font-weight: bold; color: #dc3545; display: inline-block; margin-left: 12px; font-size: 15px; }
    .btn-group { display: flex; gap: 10px; max-width: 200px; margin-top: 5px; }
    .btn-group button { flex: 1; padding: 8px; font-size: 14px; border: 1px solid #ccc; border-radius: 5px; cursor: pointer; background-color: #e0e0e0; color: #333; transition: all 0.3s; }
    .btn-group button:hover { background-color: #d0d0d0; }
    .btn-group button#backlightOnBtn.active { background-color: #28a745; color: white; border-color: #28a745; }
    .btn-group button#backlightOffBtn.active { background-color: #dc3545; color: white; border-color: #dc3545; }
    #downloadBtn { background-color: #28a745; }
    #downloadBtn:hover { background-color: #218838; }
    #downloadBtn:disabled { background-color: #ccc !important; cursor: not-allowed; }
    #disconnectBtn { background-color: #dc3545; }
    #disconnectBtn:hover { background-color: #c82333; }
    #bleControls { display: inline-flex; align-items: center; gap: 12px; margin: 0; }
    
    .monitor-grid, .settings-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 20px;
      margin-bottom: 20px;
    }
    .card {
      background: #ffffff;
      border: 1px solid #e9ecef;
      border-radius: 8px;
      padding: 15px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.03);
    }
    .action-bar {
      display: flex;
      gap: 12px;
      align-items: center;
      flex-wrap: wrap;
      margin-top: 20px;
    }
    
    /* PC表示用レスポンシブスタイル（1画面フィット・コンパクト化） */
    @media (min-width: 768px) {
      body { padding: 15px 25px; }
      .container { max-width: 1180px; padding: 20px 30px; }
      .monitor-grid { grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 12px; }
      .settings-grid { grid-template-columns: 1fr 1fr; gap: 12px 30px; margin-bottom: 12px; }
      .card { padding: 12px 16px; }
      h2 { font-size: 1.6rem; padding-bottom: 6px; margin-bottom: 12px; }
      h3 { font-size: 1.15rem; margin-bottom: 10px; border-left-width: 4px; padding-left: 8px; }
      th, td { padding: 7px 14px; font-size: 15px; }
      .form-group { margin-bottom: 10px; }
      .form-group label { font-size: 15px; display: inline-block; margin-bottom: 4px; }
      input[type="number"] { font-size: 15px; padding: 6px 12px; width: 130px; }
      button { font-size: 15px; padding: 10px 20px; border-radius: 6px; }
      .action-bar { margin-top: 12px; gap: 12px; }
      #connectionStatus { font-size: 15px; margin-left: 10px; }
      .btn-group { max-width: 200px; }
      .btn-group button { font-size: 14px; padding: 6px 10px; }
      #downloadStatus { font-size: 15px; margin-top: 8px; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div id="monitorView">
      <h2>モニタリング画面</h2>
      <div class="monitor-grid">
        <div class="card">
          <h3>観測・環境データ</h3>
          <table>
            <tr><th>項目</th><th>現在値</th></tr>
            <tr><td>日付<br>[年/月/日(曜日)]</td><td><span id="log1">--</span></td></tr>
            <tr><td>時刻[h:m:s]</td><td><span id="log2">--</span></td></tr>
            <tr><td>気温</td><td><span id="temp">--</span> ℃</td></tr>
            <tr><td>湿度</td><td><span id="humid">--</span> ％</td></tr>
            <tr><td>気圧</td><td><span id="pressure">--</span> hPa</td></tr>
            <tr><td>照度</td><td><span id="lux">--</span> lux</td></tr>
            <tr><td>内部温度</td><td><span id="innerTemp">--</span> ℃</td></tr>
          </table>
        </div>

        <div class="card">
          <h3>電力・システムステータス</h3>
          <table>
            <tr><th>項目</th><th>現在値</th></tr>
            <tr><td>発電力量</td><td><span id="inPower">--</span> W</td></tr>
            <tr><td>発電入力電圧</td><td><span id="InVoltage">--</span> V</td></tr>
            <tr><td>発電入力電流</td><td><span id="InCurrent">--</span> mA</td></tr>
            <tr><td>消費電力量</td><td><span id="outPower">--</span> W</td></tr>
            <tr><td>出力電圧 &<br>バッテリ電圧</td><td><span id="OutVoltage">--</span> V</td></tr>
            <tr><td>出力電流</td><td><span id="OutCurrent">--</span> mA</td></tr>
            <tr><td>外灯ステータス</td><td><span id="lightLamp" class="lamp lamp-green"></span><span id="lightText">--</span></td></tr>
            <tr><td>内部ファン</td><td><span id="fanLamp" class="lamp lamp-green"></span><span id="fanText">--</span></td></tr>
          </table>
        </div>
      </div>

      <div class="action-bar">
        <button onclick="toggleView()" id="toSettingsBtn" disabled>設定画面へ</button>
        <button onclick="requestDownload()" id="downloadBtn" disabled>観測データのダウンロード</button>
        <div id="bleControls">
          <button id="connectBtn">接続する(Bluetooth)</button>
          <button id="disconnectBtn" style="display: none;">切断する</button>
          <div id="connectionStatus">未接続</div>
        </div>
      </div>
      <div id="downloadStatus" style="margin-top: 10px; font-weight: bold; display: none;">
        ダウンロード中: <span id="downloadProgress">0</span>% (<span id="downloadBytes">0</span> / <span id="downloadTotal">0</span> バイト)
      </div>
    </div>

    <div id="settingsView" class="hidden">
      <h2>設定画面</h2>
      <div class="settings-grid">
        <div class="form-group">
          <label>SD書込み間隔:</label><br>
          <input type="number" id="intervalInput" value=""> 秒
        </div>
        <div class="form-group">
          <label>LCD更新時間:</label><br>
          <input type="number" id="lcdInput" value=""> ms
        </div>
        <div class="form-group">
          <label>バッテリ電圧補正:</label><br>
          <input type="number" step="0.01" id="batteryCorrectInput" value=""> V
        </div>
        <div class="form-group">
          <label>内部温度補正:</label><br>
          <input type="number" step="0.1" id="tempCorrectInput" value=""> ℃
        </div>
        <div class="form-group">
          <label>LCDバックライト:</label><br>
          <div class="btn-group">
            <button type="button" id="backlightOnBtn" onclick="selectBacklight(1)">ON</button>
            <button type="button" id="backlightOffBtn" onclick="selectBacklight(0)">OFF</button>
          </div>
        </div>
        <div class="form-group">
          <label>外灯を付ける明るさ (LED_lux_ON):</label><br>
          <input type="number" id="luxOnInput" value=""> lux
        </div>
        <div class="form-group">
          <label>外灯を消す明るさ (LED_lux_OFF):</label><br>
          <input type="number" id="luxOffInput" value=""> lux
        </div>
        <div class="form-group">
          <label>出力最低バッテリ電圧 (battery_limit_voltage):</label><br>
          <input type="number" step="0.1" id="batteryLimitInput" value=""> V
        </div>
        <div class="form-group">
          <label>ファンが回り始める温度 (TEMP_START):</label><br>
          <input type="number" step="0.1" id="tempStartInput" value=""> ℃
        </div>
        <div class="form-group">
          <label>ファンが全開になる温度 (TEMP_MAX):</label><br>
          <input type="number" step="0.1" id="tempMaxInput" value=""> ℃
        </div>
      </div>
      <div class="action-bar">
        <button onclick="saveSettings()">設定を保存</button>
        <button style="background-color: #6c757d;" onclick="toggleView()">キャンセル(戻る)</button>
      </div>
    </div>
  </div>

  <script>
    // ESP32のプログラムと一致させるUUID
    const serviceUuid = '4fafc201-1fb5-459e-8fcc-c5c9c331914b';
    const txCharacteristicUuid = 'beb5483e-36e1-4688-b7f5-ea07361b26a8'; // 受信用(Notify)
    const rxCharacteristicUuid = '1c225026-6b21-4f81-8079-c5c63aa488f7'; // 送信用(Write)
    
    let bleDevice;
    let rxCharacteristic;

    // ESP32から送られてきた設定値を保持する変数
    let serverInterval = "";
    let serverLcdDelay = "";
    let serverBatteryCorrect = "";
    let serverTempCorrect = "";
    let serverBacklight = 1;
    let selectedBacklight = 1; // 選択中の値（1: ON, 0: OFF）
    let serverLuxOn = "";
    let serverLuxOff = "";
    let serverBatteryLimit = "";
    let serverTempStart = "";
    let serverTempMax = "";

    // ダウンロード制御用変数
    let downloadBuffer = [];
    let downloadExpectedSize = 0;
    let downloadReceivedSize = 0;
    let isDownloadingFile = false;

    // 「接続する」ボタンが押された時の処理
    document.getElementById('connectBtn').addEventListener('click', async () => {
      try {
        document.getElementById('connectionStatus').innerText = '接続中...';
        document.getElementById('connectionStatus').style.color = '#ffc107';

        // 1. デバイスを検索（名前がESP32_Monitorのもの）
        bleDevice = await navigator.bluetooth.requestDevice({
          filters: [{ name: 'ESP32_Monitor' }],
          optionalServices: [serviceUuid]
        });

        // 切断された時のイベントを登録
        bleDevice.addEventListener('gattserverdisconnected', onDisconnected);

        // 2. 接続してサービスを取得
        const server = await bleDevice.gatt.connect();
        const service = await server.getPrimaryService(serviceUuid);
        
        // 3. データ受信(Notify)の開始設定
        const txCharacteristic = await service.getCharacteristic(txCharacteristicUuid);
        await txCharacteristic.startNotifications();
        txCharacteristic.addEventListener('characteristicvaluechanged', handleNotifications);
        
        // 4. データ送信(Write)用の窓口を確保
        rxCharacteristic = await service.getCharacteristic(rxCharacteristicUuid);
        
        // 画面の表示を更新
        document.getElementById('connectionStatus').innerText = '接続済み';
        document.getElementById('connectionStatus').style.color = '#28a745';
        document.getElementById('connectBtn').style.display = 'none';
        document.getElementById('disconnectBtn').style.display = 'inline-block';
        document.getElementById('toSettingsBtn').disabled = false;
        document.getElementById('downloadBtn').disabled = false;

      } catch (error) {
        console.error(error);
        document.getElementById('connectionStatus').innerText = '接続失敗';
        document.getElementById('connectionStatus').style.color = '#dc3545';
      }
    });

    // 「切断する」ボタンが押された時の処理
    document.getElementById('disconnectBtn').addEventListener('click', () => {
      if (bleDevice && bleDevice.gatt.connected) {
        bleDevice.gatt.disconnect();
      }
    });

    // 切断された時の処理
    function onDisconnected() {
      document.getElementById('connectionStatus').innerText = '切断されました';
      document.getElementById('connectionStatus').style.color = '#dc3545';
      document.getElementById('connectBtn').style.display = 'inline-block';
      document.getElementById('connectBtn').disabled = false;
      document.getElementById('disconnectBtn').style.display = 'none';
      document.getElementById('toSettingsBtn').disabled = true;
      document.getElementById('downloadBtn').disabled = true;
      document.getElementById('downloadStatus').style.display = 'none';
      isDownloadingFile = false;
    }

    // ESP32からデータを受信した時の処理
    function handleNotifications(event) {
      const value = event.target.value;
      const decoder = new TextDecoder('utf-8');
      const text = decoder.decode(value);
      
      // ファイル転送プロトコルの解析
      if (text.startsWith("FILE_START:")) {
        isDownloadingFile = true;
        downloadBuffer = [];
        downloadReceivedSize = 0;
        downloadExpectedSize = parseInt(text.split(":")[1], 10);
        
        document.getElementById('downloadStatus').style.display = 'block';
        document.getElementById('downloadProgress').innerText = '0';
        document.getElementById('downloadBytes').innerText = '0';
        document.getElementById('downloadTotal').innerText = downloadExpectedSize;
        document.getElementById('downloadBtn').disabled = true;
        document.getElementById('toSettingsBtn').disabled = true;
        return;
      }
      
      if (text.startsWith("FILE_DATA:")) {
        const chunk = text.substring(10);
        downloadBuffer.push(chunk);
        downloadReceivedSize += chunk.length;
        
        const percent = Math.min(100, Math.round((downloadReceivedSize / downloadExpectedSize) * 100));
        document.getElementById('downloadProgress').innerText = percent;
        document.getElementById('downloadBytes').innerText = downloadReceivedSize;
        return;
      }
      
      if (text === "FILE_END") {
        isDownloadingFile = false;
        const blob = new Blob([downloadBuffer.join("")], { type: "text/csv" });
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = "DATALOG_E.csv";
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
        
        alert("ダウンロードが完了しました");
        document.getElementById('downloadStatus').style.display = 'none';
        document.getElementById('downloadBtn').disabled = false;
        document.getElementById('toSettingsBtn').disabled = false;
        return;
      }
      
      if (text === "FILE_ERROR") {
        isDownloadingFile = false;
        alert("SDカード内のファイル読み込みに失敗しました");
        document.getElementById('downloadStatus').style.display = 'none';
        document.getElementById('downloadBtn').disabled = false;
        document.getElementById('toSettingsBtn').disabled = false;
        return;
      }
      
      try {
        // 受信したデータをJSONとして解析
        const data = JSON.parse(text);
        
        // 画面の数値を更新
        document.getElementById('inPower').innerText = data.InPower.toFixed(2);
        document.getElementById('InVoltage').innerText = data.InVoltage.toFixed(2);
        document.getElementById('InCurrent').innerText = data.InCurrent.toFixed(2);
        document.getElementById('outPower').innerText = data.OutPower.toFixed(2);
        document.getElementById('OutVoltage').innerText = data.OutVoltage.toFixed(2);
        document.getElementById('OutCurrent').innerText = data.OutCurrent.toFixed(2);
        document.getElementById('lux').innerText = data.Lux.toFixed(2);
        document.getElementById('log1').innerText = data.logBuffer1;
        document.getElementById('log2').innerText = data.logBuffer2;
        document.getElementById('temp').innerText = data.temp.toFixed(2);
        document.getElementById('humid').innerText = data.humid.toFixed(2);
        document.getElementById('pressure').innerText = data.pressure.toFixed(2);
        document.getElementById('innerTemp').innerText = data.InnerTemp.toFixed(2);
        
        // 外灯ステータス（ランプの色と文字の変更）
        const lightLampEl = document.getElementById('lightLamp');
        const lightTextEl = document.getElementById('lightText');
        if (data.LightState === 1) {
          lightLampEl.className = 'lamp lamp-red';
          lightTextEl.innerText = '点灯 (ON)';
        } else {
          lightLampEl.className = 'lamp lamp-green';
          lightTextEl.innerText = '消灯 (OFF)';
        }
        
        // 内部ファンステータス
        const fanLampEl = document.getElementById('fanLamp');
        const fanTextEl = document.getElementById('fanText');
        if (data.FanState === 1) {
          fanLampEl.className = 'lamp lamp-red';
          fanTextEl.innerText = '動作中 (ON)';
        } else {
          fanLampEl.className = 'lamp lamp-green';
          fanTextEl.innerText = '停止 (OFF)';
        }
        
        // 最新の設定値を裏側で保持しておく
        serverInterval = data.interval;
        serverLcdDelay = data.lcdDelay;
        serverBatteryCorrect = data.batteryCorrect;
        serverTempCorrect = data.tempCorrect;
        serverBacklight = data.backlight !== undefined ? data.backlight : 1;
        serverLuxOn = data.luxOn !== undefined ? data.luxOn : "";
        serverLuxOff = data.luxOff !== undefined ? data.luxOff : "";
        serverBatteryLimit = data.batteryLimit !== undefined ? data.batteryLimit : "";
        serverTempStart = data.tempStart !== undefined ? data.tempStart : "";
        serverTempMax = data.tempMax !== undefined ? data.tempMax : "";
        
      } catch (e) {
        console.error("データ解析エラー: ", e);
      }
    }

    // 画面切り替え（モニター ⇔ 設定）
    function toggleView() {
      const monitor = document.getElementById('monitorView');
      const settings = document.getElementById('settingsView');
      
      monitor.classList.toggle('hidden');
      settings.classList.toggle('hidden');
      
      // 設定画面を開いた時、ESP32から届いている最新の値を入力欄にセットする
      if (!settings.classList.contains('hidden')) {
        document.getElementById('intervalInput').value = serverInterval;
        document.getElementById('lcdInput').value = serverLcdDelay;
        document.getElementById('batteryCorrectInput').value = serverBatteryCorrect;
        document.getElementById('tempCorrectInput').value = serverTempCorrect;
        selectedBacklight = serverBacklight;
        updateBacklightUI();
        document.getElementById('luxOnInput').value = serverLuxOn;
        document.getElementById('luxOffInput').value = serverLuxOff;
        document.getElementById('batteryLimitInput').value = serverBatteryLimit;
        document.getElementById('tempStartInput').value = serverTempStart;
        document.getElementById('tempMaxInput').value = serverTempMax;
      }
    }

    // バックライト選択ボタンの処理
    function selectBacklight(val) {
      selectedBacklight = val;
      updateBacklightUI();
    }

    function updateBacklightUI() {
      const onBtn = document.getElementById('backlightOnBtn');
      const offBtn = document.getElementById('backlightOffBtn');
      if (selectedBacklight === 1) {
        onBtn.classList.add('active');
        offBtn.classList.remove('active');
      } else {
        onBtn.classList.remove('active');
        offBtn.classList.add('active');
      }
    }

    // 設定をESP32へ送信する処理
    async function saveSettings() {
      if (!rxCharacteristic) {
        alert('BLEデバイスに接続されていません。');
        return;
      }

      // 入力された値を取得
      let intervalVal = document.getElementById('intervalInput').value;
      let lcdVal = document.getElementById('lcdInput').value;
      let batteryCorrectVal = document.getElementById('batteryCorrectInput').value;
      let tempCorrectVal = document.getElementById('tempCorrectInput').value;
      let luxOnVal = document.getElementById('luxOnInput').value;
      let luxOffVal = document.getElementById('luxOffInput').value;
      let batteryLimitVal = document.getElementById('batteryLimitInput').value;
      let tempStartVal = document.getElementById('tempStartInput').value;
      let tempMaxVal = document.getElementById('tempMaxInput').value;
      
      // ESP32が解読しやすい文字列（クエリパラメータ形式）にする
      let sendStr = `interval=${intervalVal}&lcdDelay=${lcdVal}&batteryCorrect=${batteryCorrectVal}&tempCorrect=${tempCorrectVal}&backlight=${selectedBacklight}&luxOn=${luxOnVal}&luxOff=${luxOffVal}&batteryLimit=${batteryLimitVal}&tempStart=${tempStartVal}&tempMax=${tempMaxVal}`;
      
      // 文字列をバイトデータに変換
      const encoder = new TextEncoder();
      const data = encoder.encode(sendStr);

      try {
        // ESP32へ書き込み（送信）
        await rxCharacteristic.writeValue(data);
        alert('設定を保存しました');
        toggleView(); // 保存成功したらモニタリング画面に戻る
      } catch (error) {
        console.error(error);
        alert('設定の保存に失敗しました');
      }
    }

    // CSVファイルのダウンロード開始要求
    async function requestDownload() {
      if (!rxCharacteristic) {
        alert('BLEデバイスに接続されていません。');
        return;
      }
      
      if (!confirm('SDカードのDATALOG_E.csvをダウンロードしますか？\n(ダウンロード中、SDへのデータ書き込みは一時停止します)')) {
        return;
      }
      
      // 送信コマンドを作成
      let sendStr = "cmd=download";
      const encoder = new TextEncoder();
      const data = encoder.encode(sendStr);
      
      try {
        await rxCharacteristic.writeValue(data);
      } catch (error) {
        console.error(error);
        alert('ダウンロード開始コマンドの送信に失敗しました');
      }
    }
  </script>
</body>
</html>
